<!DOCTYPE html>
<html lang="<%=luci.i18n.media_plain()%>" data-theme="<%=L.theme_mode()%>" data-version="1.0.0"
	  data-theme-color="<%=luci.model.uci.cursor():get('oasisic', 'config', 'theme_color') or 'blue'%>"
	  data-sidebar="<%=luci.model.uci.cursor():get('oasisic', 'config', 'sidebar_mode') or 'expanded'%>">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title><%=striptags(luci.sys.hostname())%> - Oasisic</title>
	<meta name="theme-color" content="#1d1d1f">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

	<link rel="stylesheet" href="<%=media%>/css/oasisic.css">
	<link rel="stylesheet" href="<%=media%>/css/presets.css">
	<link rel="stylesheet" href="<%=media%>/css/oasisic-dark.css" media="(prefers-color-scheme: dark)">
	<link rel="stylesheet" href="<%=media%>/css/nikki.css">
	<link rel="icon" type="image/svg+xml" href="<%=media%>/img/logo.svg">

	<script src="<%=media%>/js/oasisic.js"></script>
</head>
<body>
	<div id="app" class="oasisic-layout">
		<%- include("oasisic/sidebar") %>

		<main id="maincontent" class="oasisic-main">
			<div class="oasisic-header">
				<div class="oasisic-header-left">
					<button class="oasisic-sidebar-toggle" onclick="Oasisic.toggleSidebar()" aria-label="Toggle sidebar">
						<span></span><span></span><span></span>
					</button>
					<h2 class="oasisic-page-title"><%=luci.http.write(luci.dispatcher.context.requestpath[#luci.dispatcher.context.requestpath])%></h2>
				</div>
				<div class="oasisic-header-right">
					<span class="oasisic-version">v<%= require("luci.dispatcher.oasisic").version() %></span>
				</div>
			</div>
			<div class="oasisic-content">
