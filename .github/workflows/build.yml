name: 编译

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/openwrt/sdk:x86_64-25.12.5
    steps:
      - uses: actions/checkout@v7
      - name: 编译
        run: |
          # 链接主题包到 SDK 的 package 目录
          ln -s $GITHUB_WORKSPACE package/luci-theme-oasisic
          # 安装 feeds 依赖（luci-base）
          ./scripts/feeds update -a && ./scripts/feeds install -a
          # 配置并编译
          echo "CONFIG_PACKAGE_luci-theme-oasisic=y" >> .config
          make defconfig
          openssl ecparam -genkey -name prime256v1 -out private-key.pem 2>/dev/null
          make package/luci-theme-oasisic/compile -j$(nproc) V=s 2>&1
      - name: 上传
        uses: actions/upload-artifact@v7
        with:
          name: oasisic-x86_64-25.12
          path: bin/packages/x86_64/base/luci-theme-oasisic*.apk