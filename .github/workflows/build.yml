name: 编译

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: 下载 SDK
        run: |
          wget -q -O sdk.tar.zst https://downloads.openwrt.org/releases/25.12.5/targets/x86/64/openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mkdir -p sdk
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1
      - name: 编译
        run: |
          cd sdk
          ln -s $GITHUB_WORKSPACE package/luci-theme-oasisic
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_luci-theme-oasisic=y" >> .config
          make defconfig 2>/dev/null || true
          # 确保关键选项存在
          echo "CONFIG_PACKAGE_luci-theme-oasisic=y" >> .config
          echo "CONFIG_SIGNED_PACKAGES=y" >> .config
          echo "CONFIG_SIGNATURE_CHECK=y" >> .config
          # 生成 usign 签名密钥（编译后用于签名 APK）
          make package/luci-theme-oasisic/compile -j$(nproc) V=s 2>&1
          # 编译完成后用 SDK 自带的 usign 签名 APK
          SDK_USIGN=staging_dir/host/bin/usign
          if [ -f "$SDK_USIGN" ]; then
            $SDK_USIGN -G -s key-build -p key-build.pub 2>/dev/null
            APK_FILE=$(ls bin/packages/x86_64/base/luci-theme-oasisic*.apk 2>/dev/null | head -1)
            if [ -n "$APK_FILE" ]; then
              # 签名仓库索引（APK 需要签名后的索引才能被信任）
              $SDK_USIGN -S -s key-build -m bin/packages/x86_64/base/Packages.adb -o bin/packages/x86_64/base/Packages.adb.sig 2>/dev/null || true
              echo "✅ APK 已签名"
            fi
          fi
      - name: 上传
        uses: actions/upload-artifact@v7
        with:
          name: oasisic-x86_64-25.12
          path: sdk/bin/packages/x86_64/base/luci-theme-oasisic*.apk