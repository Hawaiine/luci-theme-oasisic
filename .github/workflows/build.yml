name: 编译

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: 下载 SDK
        run: |
          wget -q -O sdk.tar.zst https://downloads.openwrt.org/releases/25.12.5/targets/x86/64/openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mkdir -p sdk
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1
      - name: 编译
        run: |
          cd sdk
          ln -s $GITHUB_WORKSPACE package/luci-theme-oasisic
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_luci-theme-oasisic=y" >> .config
          make defconfig
          # CONFIG_SIGNED_PACKAGES 必须在 defconfig 之后设置
          # 否则 Kconfig 会检测到 feeds 包中的递归依赖错误
          echo "CONFIG_SIGNED_PACKAGES=y" >> .config
          echo "CONFIG_SIGNATURE_CHECK=y" >> .config
          # 生成 usign 签名密钥（用于 APK 仓库索引签名）
          usign -G -s key-build -p key-build.pub 2>/dev/null
          make package/luci-theme-oasisic/compile -j$(nproc) V=s 2>&1
      - name: 上传
        uses: actions/upload-artifact@v7
        with:
          name: oasisic-x86_64-25.12
          path: sdk/bin/packages/x86_64/base/luci-theme-oasisic*.apk