name: 编译

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: 下载 SDK
        run: |
          wget -q -O sdk.tar.zst https://downloads.openwrt.org/releases/25.12.5/targets/x86/64/openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mkdir -p sdk
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1
      - name: 编译
        run: |
          cd sdk
          ln -s $GITHUB_WORKSPACE package/luci-theme-oasisic
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_luci-theme-oasisic=y" >> .config
          make defconfig 2>/dev/null || true
          echo "CONFIG_PACKAGE_luci-theme-oasisic=y" >> .config
          echo "CONFIG_SIGNED_PACKAGES=y" >> .config
          echo "CONFIG_SIGNATURE_CHECK=y" >> .config
          make package/luci-theme-oasisic/compile -j$(nproc) V=s 2>&1
          # 签名 APK（用 apk sign 嵌入签名，使 apk add 无需 --allow-untrusted）
          SDK_APK=staging_dir/host/bin/apk
          SDK_USIGN=staging_dir/host/bin/usign
          APK_FILE=$(ls bin/packages/x86_64/base/luci-theme-oasisic*.apk 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            # 生成签名密钥
            $SDK_USIGN -G -s key-build -p key-build.pub 2>/dev/null || true
            # 尝试用 apk sign 嵌入签名（apk-tools 3.x 支持）
            $SDK_APK sign --key key-build "$APK_FILE" 2>/dev/null && echo "✅ APK 内嵌签名完成" || echo "⚠️ apk sign 不可用，用 usign 签名仓库索引"
            # 后备：用 usign 签名仓库索引
            $SDK_USIGN -S -s key-build -m "$APK_FILE" -o "$APK_FILE.sig" 2>/dev/null || true
          fi
      - name: 上传
        uses: actions/upload-artifact@v7
        with:
          name: oasisic-x86_64-25.12
          path: |
            sdk/bin/packages/x86_64/base/luci-theme-oasisic*.apk
            sdk/key-build.pub