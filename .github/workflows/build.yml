name: 编译

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: 编译
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq build-essential gawk wget git diffstat unzip texinfo zstd libssl-dev flex bison python3 python3-pip file gcc-multilib g++-multilib rsync gettext libdeflate-tools
          git clone --depth=1 -b openwrt-25.12 https://github.com/openwrt/openwrt.git
          ln -s $GITHUB_WORKSPACE openwrt/package/luci-theme-oasisic
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_luci-theme-oasisic=y" >> .config
          make defconfig
          # 替换目标架构为 x86_64（默认是 aarch64，toolchain 编译慢且不需要）
          sed -i 's/CONFIG_TARGET_mediatek_filogic=y/CONFIG_TARGET_x86_64=y/' .config 2>/dev/null || true
          sed -i 's/CONFIG_TARGET_mediatek=y/CONFIG_TARGET_x86=y/' .config 2>/dev/null || true
          sed -i '/CONFIG_TARGET_aarch64/d' .config 2>/dev/null || true
          echo "CONFIG_TARGET_x86_64_Generic=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          # 先编译 host tools，避免后续 host 编译时找不到工具
          make tools/compile -j$(nproc) 2>&1
          # 生成签名密钥（CONFIG_SIGNED_PACKAGES 需要 EC 私钥）
          openssl ecparam -genkey -name prime256v1 -out private-key.pem 2>/dev/null
          make package/luci-theme-oasisic/compile -j$(nproc) V=s 2>&1
      - name: 上传
        uses: actions/upload-artifact@v7
        with:
          name: oasisic-x86_64-25.12
          path: openwrt/bin/packages/x86_64/base/luci-theme-oasisic*.apk