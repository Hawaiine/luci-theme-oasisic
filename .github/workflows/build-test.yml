name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.1
          npm install -g stylelint 2>/dev/null || true

      - name: Check syntax — Lua
        run: |
          ERR=0
          for f in $(find luasrc/ -name '*.lua'); do
            luac -p "$f" && echo "  ✅ $f" || { echo "  ❌ $f"; ERR=1; }
          done
          [ "$ERR" -eq 0 ] || exit 1

      - name: Check syntax — JavaScript
        run: |
          ERR=0
          for f in $(find htdocs/ -name '*.js'); do
            node --check "$f" && echo "  ✅ $(basename $f)" || { echo "  ❌ $(basename $f)"; ERR=1; }
          done
          [ "$ERR" -eq 0 ] || exit 1

      - name: Check syntax — CSS
        run: |
          if command -v stylelint &>/dev/null; then
            stylelint htdocs/luci-static/oasisic/css/*.css --config='{"rules":{"block-no-empty":true,"color-no-invalid-hex":true,"declaration-block-no-duplicate-properties":true}}' 2>&1 || true
          fi
          echo "✅ CSS files scanned"

      - name: Verify file structure
        run: |
          echo "=== 文件结构 ==="
          find . -not -path './.git/*' -not -path './assets/*' -type f | sort
          echo ""
          echo "=== 必要文件检查 ==="
          for f in Makefile LICENSE README.md README.zh-CN.md; do
            if [ -f "$f" ]; then echo "  ✅ $f"; else echo "  ❌ $f"; fi
          done