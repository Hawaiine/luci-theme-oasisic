<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#EDF0F5"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#1A2332"/>
    </linearGradient>
    <linearGradient id="sidebarDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F1219"/>
      <stop offset="100%" stop-color="#0D1017"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#0052CC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgLight)"/>

  <!-- Two states side by side: Expanded (left) and Collapsed (right) -->

  <!-- === EXPANDED SIDEBAR === -->
  <g>
    <rect x="40" y="20" width="260" height="680" rx="14" fill="url(#sidebarGrad)"/>
    <!-- Shadow -->
    <rect x="40" y="20" width="260" height="680" rx="14" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

    <!-- Logo -->
    <rect x="24" y="32" width="28" height="28" rx="7" fill="url(#btnGrad)"/>
    <text x="60" y="52" fill="#fff" font-size="17" font-weight="700" letter-spacing="0.5">OASISIC</text>
    <text x="120" y="52" fill="rgba(255,255,255,0.25)" font-size="10">v1.0</text>

    <!-- Search -->
    <rect x="20" y="74" width="260" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="42" y="97" fill="rgba(255,255,255,0.3)" font-size="13">/ 快速跳转...</text>

    <!-- Menu Section: 状态 -->
    <text x="22" y="138" fill="rgba(255,255,255,0.25)" font-size="10" letter-spacing="1" text-transform="uppercase">状态</text>

    <!-- Menu items -->
    <g font-size="13.5">
      <!-- Active -->
      <g transform="translate(0, 148)">
        <rect x="12" y="0" width="276" height="38" rx="8" fill="rgba(0,102,255,0.12)"/>
        <rect x="12" y="0" width="3" height="38" rx="1.5" fill="#0066FF"/>
        <text x="48" y="25" fill="#fff" font-weight="600">📊 仪表盘</text>
      </g>
      <!-- Normal items -->
      <g transform="translate(0, 190)">
        <rect x="12" y="0" width="276" height="34" rx="6" fill="transparent"/>
        <text x="48" y="23" fill="rgba(255,255,255,0.6)">📡 概览</text>
      </g>
      <g transform="translate(0, 227)">
        <text x="48" y="23" fill="rgba(255,255,255,0.6)">📈 实时流量</text>
        <!-- Badge -->
        <rect x="160" y="11" width="28" height="16" rx="4" fill="rgba(0,102,255,0.2)"/>
        <text x="174" y="23" fill="#0066FF" font-size="10" font-weight="600">NEW</text>
      </g>
    </g>

    <!-- Menu Section: 网络 -->
    <text x="22" y="285" fill="rgba(255,255,255,0.25)" font-size="10" letter-spacing="1">网络</text>

    <g font-size="13.5">
      <g transform="translate(0, 295)">
        <text x="48" y="23" fill="rgba(255,255,255,0.6)">🌐 接口</text>
      </g>
      <g transform="translate(0, 332)">
        <text x="48" y="23" fill="rgba(255,255,255,0.6)">📶 无线</text>
      </g>
      <g transform="translate(0, 369)">
        <text x="48" y="23" fill="rgba(255,255,255,0.6)">🔗 DHCP 与 DNS</text>
      </g>
      <!-- Expanded submenu -->
      <g transform="translate(12, 406)">
        <rect x="0" y="0" width="264" height="30" rx="5" fill="rgba(255,255,255,0.03)"/>
        <text x="55" y="20" fill="rgba(255,255,255,0.45)" font-size="12">▸ 主机名</text>
      </g>
      <g transform="translate(12, 440)">
        <rect x="0" y="0" width="264" height="30" rx="5" fill="rgba(255,255,255,0.03)"/>
        <text x="55" y="20" fill="rgba(255,255,255,0.45)" font-size="12">▸ 静态路由</text>
      </g>
      <g transform="translate(0, 478)">
        <text x="48" y="23" fill="rgba(255,255,255,0.6)">🛡️ 防火墙</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="22" y1="530" x2="298" y2="530" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Menu Section: 服务 -->
    <text x="22" y="554" fill="rgba(255,255,255,0.25)" font-size="10" letter-spacing="1">服务</text>

    <g font-size="13.5">
      <g transform="translate(0, 564)">
        <text x="48" y="23" fill="rgba(255,255,255,0.6)">⚡ Nikki</text>
        <!-- Nikki active dot -->
        <circle cx="240" cy="18" r="3" fill="#10B981"/>
      </g>
      <g transform="translate(0, 601)">
        <text x="48" y="23" fill="rgba(255,255,255,0.6)">🔑 PassWall</text>
      </g>
    </g>

    <!-- Bottom: device info + theme toggle -->
    <rect x="16" y="640" width="268" height="44" rx="8" fill="rgba(255,255,255,0.04)"/>
    <text x="28" y="658" fill="rgba(255,255,255,0.4)" font-size="11">OpenWrt 24.10 · 旁路网关</text>
    <!-- Theme toggle -->
    <rect x="215" y="648" width="44" height="24" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="226" y="663" fill="rgba(255,255,255,0.4)" font-size="10">☀️</text>
    <circle cx="248" cy="660" r="9" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Arrow between states -->
  <g transform="translate(330, 360)">
    <path d="M0 -20 L20 0 L0 20" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 -20 L40 0 L20 20" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- === COLLAPSED SIDEBAR (icon-only) === -->
  <g transform="translate(390, 20)">
    <rect x="0" y="0" width="260" height="680" rx="14" fill="url(#sidebarDark)"/>
    <rect x="0" y="0" width="260" height="680" rx="14" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Logo (small) -->
    <rect x="20" y="32" width="28" height="28" rx="7" fill="url(#btnGrad)"/>
    <text x="32" y="52" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">O</text>

    <!-- Menu items (icon only) -->
    <g transform="translate(0, 90)">
      <!-- Active -->
      <rect x="10" y="0" width="40" height="40" rx="10" fill="rgba(0,102,255,0.15)"/>
      <text x="30" y="26" fill="#fff" font-size="16" text-anchor="middle">📊</text>

      <rect x="10" y="50" width="40" height="40" rx="10" fill="transparent"/>
      <text x="30" y="76" fill="rgba(255,255,255,0.4)" font-size="16" text-anchor="middle">📡</text>

      <rect x="10" y="100" width="40" height="40" rx="10" fill="transparent"/>
      <text x="30" y="126" fill="rgba(255,255,255,0.4)" font-size="16" text-anchor="middle">📈</text>

      <rect x="10" y="150" width="40" height="40" rx="10" fill="transparent"/>
      <text x="30" y="176" fill="rgba(255,255,255,0.4)" font-size="16" text-anchor="middle">🌐</text>

      <rect x="10" y="200" width="40" height="40" rx="10" fill="transparent"/>
      <text x="30" y="226" fill="rgba(255,255,255,0.4)" font-size="16" text-anchor="middle">📶</text>

      <rect x="10" y="250" width="40" height="40" rx="10" fill="transparent"/>
      <text x="30" y="276" fill="rgba(255,255,255,0.4)" font-size="16" text-anchor="middle">🛡️</text>

      <rect x="10" y="300" width="40" height="40" rx="10" fill="transparent"/>
      <text x="30" y="326" fill="rgba(255,255,255,0.4)" font-size="16" text-anchor="middle">⚡</text>
    </g>

    <!-- Bottom -->
    <rect x="10" y="640" width="40" height="40" rx="10" fill="rgba(255,255,255,0.04)"/>
    <text x="30" y="666" fill="rgba(255,255,255,0.3)" font-size="14" text-anchor="middle">☀️</text>

    <!-- Tooltip popup -->
    <g transform="translate(60, 140)">
      <rect x="0" y="0" width="140" height="36" rx="8" fill="#1A1D23" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="16" y="23" fill="#fff" font-size="13">📈 实时流量</text>
      <rect x="-4" y="12" width="6" height="12" fill="#1A1D23"/>
    </g>
  </g>

  <!-- Labels -->
  <rect x="55" y="715" width="95" height="20" rx="4" fill="rgba(0,102,255,0.15)"/>
  <text x="102" y="730" fill="#0066FF" font-size="11" font-weight="600" text-anchor="middle">展开模式</text>

  <rect x="470" y="715" width="95" height="20" rx="4" fill="rgba(0,102,255,0.15)"/>
  <text x="517" y="730" fill="#0066FF" font-size="11" font-weight="600" text-anchor="middle">折叠模式</text>
</svg>