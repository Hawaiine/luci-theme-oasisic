<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="40%" stop-color="#141b3d"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#0052CC"/>
    </linearGradient>
    <filter id="glass">
      <feGaussianBlur stdDeviation="1" in="SourceGraphic"/>
      <feMerge><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Grid overlay -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="720"/><line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/><line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/><line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/><line x1="1120" y1="0" x2="1120" y2="720"/>
    <line x1="0" y1="0" x2="1280" y2="0"/><line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/><line x1="0" y1="600" x2="1280" y2="600"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="180" fill="url(#accent)" opacity="0.04"/>
  <circle cx="1100" cy="550" r="240" fill="url(#accent)" opacity="0.03"/>
  <circle cx="650" cy="400" r="300" fill="url(#accent)" opacity="0.02"/>

  <!-- Particles -->
  <g opacity="0.15" fill="#0066FF">
    <circle cx="120" cy="200" r="2"/><circle cx="350" cy="100" r="1.5"/>
    <circle cx="900" cy="180" r="2.5"/><circle cx="1050" cy="300" r="1.5"/>
    <circle cx="250" cy="500" r="2"/><circle cx="400" cy="600" r="1"/>
    <circle cx="1000" cy="650" r="2"/><circle cx="1150" cy="450" r="1.5"/>
  </g>

  <!-- Login Card -->
  <g transform="translate(640, 360)">
    <!-- Card glow -->
    <rect x="-220" y="-260" width="440" height="520" rx="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Card background (glassmorphism) -->
    <rect x="-220" y="-260" width="440" height="520" rx="20" fill="url(#cardBg)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Logo area -->
    <g transform="translate(0, -210)">
      <circle cx="-30" cy="0" r="16" fill="url(#btnGrad)"/>
      <text x="-10" y="6" fill="#fff" font-size="16" font-weight="700" text-anchor="start">O</text>
      <text x="15" y="6" fill="#fff" font-size="18" font-weight="700" letter-spacing="1">OASISIC</text>
    </g>

    <!-- Title -->
    <text x="0" y="-160" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">欢迎回来</text>
    <text x="0" y="-138" fill="rgba(255,255,255,0.5)" font-size="13" text-anchor="middle">请登录以管理路由器</text>

    <!-- Username field -->
    <g transform="translate(0, -95)">
      <rect x="-180" y="0" width="360" height="42" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="-160" y="26" fill="rgba(255,255,255,0.35)" font-size="13">用户名</text>
      <!-- User icon -->
      <circle cx="155" cy="21" r="8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
      <circle cx="155" cy="18" r="2.5" fill="rgba(255,255,255,0.2)"/>
      <path d="M150 27 Q155 24 160 27" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    </g>

    <!-- Password field -->
    <g transform="translate(0, -40)">
      <rect x="-180" y="0" width="360" height="42" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="-160" y="26" fill="rgba(255,255,255,0.35)" font-size="13">密码</text>
      <!-- Lock icon -->
      <g transform="translate(148, 12)">
        <rect x="0" y="6" width="12" height="9" rx="2" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
        <path d="M3 6 V4 A3 3 0 0 1 9 4 V6" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
      </g>
    </g>

    <!-- Remember me + Passkey -->
    <g transform="translate(0, 15)">
      <rect x="-180" y="0" width="14" height="14" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <text x="-158" y="12" fill="rgba(255,255,255,0.5)" font-size="12">记住我</text>
      <!-- Passkey badge -->
      <rect x="85" y="-2" width="70" height="18" rx="9" fill="rgba(0,102,255,0.15)" stroke="rgba(0,102,255,0.3)" stroke-width="0.8"/>
      <text x="100" y="11" fill="#0066FF" font-size="10" font-weight="600">🔑 Passkey</text>
    </g>

    <!-- Login button -->
    <g transform="translate(0, 60)">
      <rect x="-180" y="0" width="360" height="44" rx="10" fill="url(#btnGrad)"/>
      <text x="0" y="27" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">登录</text>
    </g>

    <!-- 2FA option -->
    <rect x="55" y="108" width="90" height="22" rx="11" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
    <text x="77" y="122" fill="rgba(255,255,255,0.4)" font-size="10">两步验证 2FA</text>

    <!-- Footer -->
    <text x="0" y="220" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">v1.0.0 · OpenWrt LuCI · © 2026</text>
  </g>

  <!-- Label -->
  <rect x="20" y="680" width="140" height="24" rx="4" fill="rgba(0,102,255,0.15)"/>
  <text x="90" y="696" fill="#0066FF" font-size="12" font-weight="600" text-anchor="middle">🔐 登录页概念</text>
</svg>