<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#EDF0F5"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#1A2332"/>
    </linearGradient>
    <linearGradient id="rightPanelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141B3D"/>
      <stop offset="100%" stop-color="#1A0A2E"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#0052CC"/>
    </linearGradient>
    <linearGradient id="stepDone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgLight)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1280" height="56" fill="#fff" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
  <rect x="16" y="14" width="28" height="28" rx="7" fill="url(#btnGrad)"/>
  <text x="52" y="34" fill="#1A1D23" font-size="16" font-weight="700">OASISIC</text>
  <text x="124" y="34" fill="#64748B" font-size="12">设置向导</text>

  <!-- Progress dots top right -->
  <g transform="translate(1100, 28)">
    <circle cx="0" cy="0" r="5" fill="#0066FF"/>
    <line x1="12" y1="0" x2="28" y2="0" stroke="#E2E8F0" stroke-width="2"/>
    <circle cx="36" cy="0" r="5" fill="#E2E8F0"/>
    <line x1="48" y1="0" x2="64" y2="0" stroke="#E2E8F0" stroke-width="2"/>
    <circle cx="72" cy="0" r="5" fill="#E2E8F0"/>
  </g>

  <!-- Three-panel layout -->
  <g transform="translate(0, 72)">

    <!-- === LEFT SIDEBAR (Step indicator) === -->
    <g>
      <rect x="20" y="0" width="220" height="648" rx="14" fill="url(#sidebarGrad)"/>

      <!-- Steps list -->
      <g transform="translate(36, 48)">
        <!-- Step 1: Active -->
        <g>
          <rect x="0" y="0" width="168" height="60" rx="10" fill="rgba(0,102,255,0.12)"/>
          <circle cx="24" cy="30" r="14" fill="url(#btnGrad)"/>
          <text x="24" y="35" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">1</text>
          <text x="52" y="24" fill="#fff" font-size="14" font-weight="600">网络设置</text>
          <text x="52" y="42" fill="rgba(255,255,255,0.4)" font-size="11">LAN IP, DNS, 网关</text>
        </g>

        <!-- Connector line -->
        <line x1="24" y1="70" x2="24" y2="88" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

        <!-- Step 2: Done -->
        <g transform="translate(0, 90)">
          <rect x="0" y="0" width="168" height="60" rx="10" fill="rgba(16,185,129,0.08)"/>
          <circle cx="24" cy="30" r="14" fill="url(#stepDone)"/>
          <text x="24" y="35" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">✓</text>
          <text x="52" y="24" fill="#10B981" font-size="14" font-weight="600">管理员密码</text>
          <text x="52" y="42" fill="rgba(255,255,255,0.35)" font-size="11">Web/SSH 访问</text>
        </g>

        <!-- Connector line -->
        <line x1="24" y1="160" x2="24" y2="178" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

        <!-- Step 3: Pending -->
        <g transform="translate(0, 180)">
          <rect x="0" y="0" width="168" height="60" rx="10" fill="transparent"/>
          <circle cx="24" cy="30" r="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
          <text x="24" y="35" fill="rgba(255,255,255,0.3)" font-size="12" font-weight="700" text-anchor="middle">3</text>
          <text x="52" y="24" fill="rgba(255,255,255,0.3)" font-size="14">确认完成</text>
          <text x="52" y="42" fill="rgba(255,255,255,0.2)" font-size="11">应用并重启</text>
        </g>
      </g>

      <!-- Bottom info -->
      <rect x="16" y="590" width="188" height="44" rx="8" fill="rgba(255,255,255,0.04)"/>
      <text x="28" y="608" fill="rgba(255,255,255,0.35)" font-size="11">第 1 步 / 共 3 步</text>
      <text x="28" y="624" fill="rgba(255,255,255,0.2)" font-size="10">预计 2 分钟完成</text>
    </g>

    <!-- === CENTER PANEL (Main form) === -->
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="680" height="648" rx="14" fill="#fff" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>

      <!-- Title -->
      <text x="32" y="40" fill="#1A1D23" font-size="22" font-weight="700">欢迎使用 OASISIC 主题</text>
      <text x="32" y="66" fill="#64748B" font-size="13">配置基本网络参数以启动设备，更改后将自动重启。</text>

      <!-- Form fields -->
      <g transform="translate(32, 100)">
        <!-- LAN IP -->
        <text x="0" y="10" fill="#1A1D23" font-size="13" font-weight="600">LAN IP 地址 <tspan fill="#EF4444">*</tspan></text>
        <rect x="0" y="20" width="616" height="42" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
        <text x="16" y="47" fill="#1A1D23" font-size="14">10.10.10.252</text>
        <text x="0" y="78" fill="#94A3B8" font-size="11">管理地址，修改后使用新地址访问</text>

        <!-- Port -->
        <text x="0" y="112" fill="#1A1D23" font-size="13" font-weight="600">管理端口 <tspan fill="#EF4444">*</tspan></text>
        <rect x="0" y="122" width="616" height="42" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
        <text x="16" y="149" fill="#1A1D23" font-size="14">80</text>
        <text x="0" y="180" fill="#94A3B8" font-size="11">默认 80 (HTTP)</text>

        <!-- Subnet Mask -->
        <text x="0" y="214" fill="#1A1D23" font-size="13" font-weight="600">子网掩码 <tspan fill="#EF4444">*</tspan></text>
        <rect x="0" y="224" width="616" height="42" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
        <text x="16" y="251" fill="#1A1D23" font-size="14">255.255.255.0</text>

        <!-- Gateway -->
        <text x="0" y="290" fill="#1A1D23" font-size="13" font-weight="600">默认网关 <tspan fill="#EF4444">*</tspan></text>
        <rect x="0" y="300" width="616" height="42" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
        <text x="16" y="327" fill="#1A1D23" font-size="14">10.10.10.253</text>

        <!-- Preferred DNS -->
        <text x="0" y="366" fill="#1A1D23" font-size="13" font-weight="600">首选 DNS</text>
        <rect x="0" y="376" width="290" height="42" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
        <text x="12" y="403" fill="#94A3B8" font-size="13">可选，留空自动</text>

        <!-- Backup DNS -->
        <text x="326" y="366" fill="#1A1D23" font-size="13" font-weight="600">备用 DNS</text>
        <rect x="326" y="376" width="290" height="42" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
        <text x="338" y="403" fill="#94A3B8" font-size="13">可选，留空自动</text>
      </g>

      <!-- Buttons -->
      <g transform="translate(290, 560)">
        <rect x="0" y="0" width="80" height="40" rx="8" fill="transparent" stroke="#E2E8F0" stroke-width="1"/>
        <text x="40" y="25" fill="#64748B" font-size="13" font-weight="500" text-anchor="middle">跳过</text>

        <rect x="100" y="0" width="140" height="40" rx="8" fill="url(#btnGrad)"/>
        <text x="170" y="25" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">下一步 →</text>
      </g>
    </g>

    <!-- === RIGHT PANEL (Dark card with diagram) === -->
    <g transform="translate(960, 0)">
      <rect x="0" y="0" width="300" height="648" rx="14" fill="url(#rightPanelGrad)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

      <!-- Network topology diagram -->
      <g transform="translate(30, 40)">
        <text x="120" y="0" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">网络拓扑 (旁路网关)</text>

        <!-- Internet -->
        <rect x="80" y="20" width="80" height="30" rx="8" fill="rgba(0,102,255,0.15)"/>
        <text x="120" y="40" fill="#0066FF" font-size="12" font-weight="600" text-anchor="middle">🌐 Internet</text>

        <!-- Line down -->
        <line x1="120" y1="50" x2="120" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

        <!-- RouterOS -->
        <rect x="60" y="80" width="120" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="120" y="103" fill="rgba(255,255,255,0.7)" font-size="12" text-anchor="middle">RouterOS (主路由)</text>

        <!-- Line branching -->
        <line x1="120" y1="116" x2="120" y2="146" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

        <!-- OpenWrt (旁路网关) -->
        <rect x="30" y="146" width="120" height="36" rx="8" fill="rgba(0,102,255,0.12)" stroke="rgba(0,102,255,0.2)" stroke-width="1"/>
        <text x="90" y="169" fill="#0066FF" font-size="12" text-anchor="middle">OpenWrt (旁路)</text>

        <!-- Line to devices -->
        <line x1="60" y1="182" x2="60" y2="210" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
        <line x1="120" y1="182" x2="120" y2="230" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

        <!-- Devices -->
        <rect x="10" y="212" width="100" height="26" rx="6" fill="rgba(255,255,255,0.04)"/>
        <text x="60" y="230" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">📱 客户端设备</text>

        <!-- AWS Server -->
        <rect x="80" y="250" width="140" height="36" rx="8" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
        <text x="150" y="273" fill="#10B981" font-size="11" text-anchor="middle" font-weight="600">AWS-JP 52.199.xx.xx</text>

        <!-- Arrow to AWS -->
        <line x1="180" y1="182" x2="220" y2="182" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
        <line x1="220" y1="182" x2="220" y2="250" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
        <polyline points="170,176 218,245 222,245 175,178" fill="none" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
      </g>

      <!-- Summary card -->
      <g transform="translate(20, 340)">
        <rect x="0" y="0" width="260" height="160" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

        <g transform="translate(16, 16)">
          <text x="0" y="0" fill="rgba(255,255,255,0.4)" font-size="10" letter-spacing="1">配置摘要</text>
          <line x1="0" y1="12" x2="228" y2="12" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

          <g font-size="12" transform="translate(0, 28)">
            <text x="0" y="0" fill="rgba(255,255,255,0.35)">LAN IP</text>
            <text x="160" y="0" fill="#fff">10.10.10.252</text>

            <text x="0" y="24" fill="rgba(255,255,255,0.35)">子网掩码</text>
            <text x="160" y="24" fill="#fff">255.255.255.0</text>

            <text x="0" y="48" fill="rgba(255,255,255,0.35)">网关</text>
            <text x="160" y="48" fill="#fff">10.10.10.253</text>

            <text x="0" y="72" fill="rgba(255,255,255,0.35)">端口</text>
            <text x="160" y="72" fill="#fff">80 (HTTP)</text>

            <text x="0" y="96" fill="rgba(255,255,255,0.35)">模式</text>
            <text x="160" y="96" fill="#10B981">旁路网关</text>
          </g>
        </g>
      </g>

      <!-- Bottom info -->
      <text x="150" y="618" fill="rgba(255,255,255,0.15)" font-size="10" text-anchor="middle">配置实时同步到右侧</text>
    </g>
  </g>

  <!-- Label -->
  <rect x="20" y="736" width="165" height="20" rx="4" fill="rgba(0,102,255,0.15)"/>
  <text x="102" y="750" fill="#0066FF" font-size="11" font-weight="600" text-anchor="middle">🪜 设置向导概念</text>
</svg>